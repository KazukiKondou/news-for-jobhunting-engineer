server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Daily pages live at /YYYY-MM-DD/index.html so directory mapping is the norm.
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # days.json manifest — short-lived cache so a newly added day reflects in the
    # runtime day-nav self-healing almost immediately.
    location = /days.json {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Static assets: short cache so updates take effect quickly. Use ?v=N
    # cache-bust in the HTML when the CSS changes for instant rollout.
    location /assets/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        access_log off;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # HTML pages - short cache, must revalidate
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Security headers (Cloudflare can also set these, harmless to duplicate)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;
}
