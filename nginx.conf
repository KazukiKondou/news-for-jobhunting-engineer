server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Astro built with format: 'directory' + trailingSlash: 'always'
    # So /foo/ maps to /foo/index.html
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Long-cache hashed assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # HTML pages - short cache, must revalidate
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Security headers (Cloudflare can also set these, harmless to duplicate)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;
}
