<!--
  ============================================================
  Daily page template — エンジニア就活ニュース
  ============================================================
  The LINE routine should generate site/YYYY-MM-DD/index.html
  by filling in this template. Replacement tokens:

    {{DATE_ISO}}       e.g. 2026-05-11
    {{DATE_LABEL}}     e.g. 2026年5月11日 (月)
    {{DATE_OG_DT}}     e.g. 2026-05-11T00:00:00+09:00
    {{COUNT}}          e.g. 6
    {{INTRO}}          one-paragraph intro for the day
    {{HEADLINES_TEXT}} comma-joined first 3 titles (used in meta description)
    {{TOC_ITEMS}}      <li><span class="toc__num">NN</span><a href="#article-N">title</a></li> ...
    {{ARTICLES}}       <article class="article-card" id="article-N">...</article> ...
    {{PREV_HREF}}      e.g. /2026-05-10/  (empty string if none)
    {{PREV_LABEL}}     e.g. 2026年5月10日 (empty string if none)
    {{NEXT_HREF}}      empty when generating today (no next yet)
    {{NEXT_LABEL}}     empty

  Article card snippet ({{ARTICLES}} item, repeated N times, N = 1..COUNT):

    <article class="article-card" id="article-{{N}}">
          <div class="article-card__body">
            <div class="tags">
            <span class="tag-chip">#{{TAG_1}}</span>
            <span class="tag-chip">#{{TAG_2}}</span>
          </div>

        <h3 class="article-card__title"><a href="{{SOURCE_URL}}" target="_blank" rel="noopener noreferrer">{{TITLE}}</a></h3>
        <p class="article-card__summary">{{SUMMARY_3_TO_4_LINES}}</p>
        <div class="article-card__meta">
          <div class="article-source">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6Z"/></svg>
            <span>{{SOURCE_NAME}}</span>
          </div>
          <a class="article-link" href="{{SOURCE_URL}}" target="_blank" rel="noopener noreferrer">元記事を読む <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17 17 7M7 7h10v10"/></svg></a>
        </div>
      </div>
    </article>

  Day-nav (3 slots): prev | latest("最新の日へ", href="/") | status.
  Since a freshly generated page IS the latest day, bake the RIGHT slot as the
  "最新の記事です" status (NOT a next button) — there is no next day yet. The
  center "最新の日へ" accent button is always present. Only the prev slot's <a>
  is emitted when a previous day exists (omit the element entirely on the very
  first day so the grid stays balanced).

  Do NOT regenerate yesterday's page to add a "next day" button: /assets/day-nav.js
  reads /days.json at runtime and self-heals every page's prev/next/latest, so a
  page automatically gains its "next day" link once the following day is published.
  days.json itself is generated at Docker build time — never hand-maintained.

  Set data-date="{{DATE_ISO}}" on <nav class="day-nav"> so the script can locate
  the current page in the manifest.

  After generating the daily page, ALSO update site/index.html (latest day
  hero + 'recent days' list) and site/archive/index.html (full grid).
  See those files for the markers `LATEST_DAY_START..END`, `RECENT_DAYS_START..END`,
  `ARCHIVE_LIST_START..END`.
-->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{DATE_LABEL}} | エンジニア就活ニュース</title>
  <meta name="description" content="{{DATE_LABEL}}のテックニュース {{COUNT}}件: {{HEADLINES_TEXT}}" />
  <link rel="canonical" href="https://news.kazukikondo.com/{{DATE_ISO}}/" />
  <!-- Emit rel=prev only when a previous day exists. rel=next is intentionally
       NOT baked here (this page is the latest); day-nav.js + days.json add it
       at runtime once the following day is published. -->
  <link rel="prev" href="{{PREV_HREF}}" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{DATE_LABEL}} | エンジニア就活ニュース" />
  <meta property="og:description" content="本日のテックニュース {{COUNT}}件" />
  <meta property="og:url" content="https://news.kazukikondo.com/{{DATE_ISO}}/" />
  <meta property="og:site_name" content="エンジニア就活ニュース" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="article:published_time" content="{{DATE_OG_DT}}" />

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700;900&display=swap" />
  <link rel="stylesheet" href="/assets/style.css?v=3" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-logo" href="/">
        <span class="site-logo__badge">N</span>
        <span class="site-logo__title">エンジニア就活ニュース</span>
      </a>
      <nav class="site-nav">
        <a class="site-nav__link" href="/">ホーム</a>
        <a class="site-nav__link" href="/archive/">アーカイブ</a>
      </nav>
    </div>
  </header>

  <main>
    <article class="day-article">
      <header class="day-header">
        <div class="eyebrow">Daily News</div>
        <h1 class="day-title">{{DATE_LABEL}}</h1>
        <p class="day-meta">本日のニュース <strong>{{COUNT}}</strong> 件</p>
        <p class="day-intro">{{INTRO}}</p>
      </header>

      <details class="toc" open aria-label="本日の見出し一覧">
        <summary class="toc__summary">
          <span class="toc__summary-text">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            見出し一覧
          </span>
          <span class="toc__summary-meta">
            0件
            <svg class="toc__chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </span>
        </summary>
        <ol class="toc__list">
          {{TOC_ITEMS}}
        </ol>
      </details>

      {{ARTICLES_SECTIONS}}

      <nav class="day-nav" aria-label="日付ナビゲーション" data-date="{{DATE_ISO}}">
        <a class="day-nav__btn day-nav__btn--prev" href="{{PREV_HREF}}" rel="prev" aria-label="前の日のニュース {{PREV_LABEL}}へ">
          <span class="day-nav__label">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
            前の日
          </span>
          <span class="day-nav__date">{{PREV_LABEL}}</span>
        </a>
        <a class="day-nav__btn day-nav__btn--latest" href="/" aria-label="最新の日のニュースへ">
          最新の日へ
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 17 5-5-5-5M13 17l5-5-5-5"/></svg>
        </a>
        <div class="day-nav__status" role="status">
          <svg class="day-nav__status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span class="day-nav__status-text">最新の記事です</span>
        </div>
      </nav>
    </article>
  </main>

    <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="site-footer__main">
        <div class="site-footer__brand">
          <span class="site-logo__badge">N</span>
          エンジニア就活ニュース
        </div>
        <div class="site-footer__tagline">エンジニア就活生のための日次テックニュース。LINE配信した記事を毎日まとめて公開しています。</div>
      </div>
      <div class="site-footer__row">
        <div class="site-footer__meta">
          <span>© 2026 Kazuki Kondo</span>
          <span class="site-footer__sep">·</span>
          <span>毎日更新</span>
          <span class="site-footer__sep">·</span>
          <span>LINE配信と連動</span>
        </div>
        <div class="site-footer__updated">最終更新: 2026/05/11 06:00 JST</div>
      </div>
    </div>
  </footer>
  <script src="/assets/day-nav.js?v=1" defer></script>
</body>
</html>
